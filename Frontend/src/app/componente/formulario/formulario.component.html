<div class="container card mt-5">
    <h1 class="mt-3">Formulario de Cadastro</h1>

    <form [formGroup]="usuarioForm" (ngSubmit)="submit()">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control w-75" placeholder="Digite seu nome" formControlName="nome">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="text" class="form-control w-75" placeholder="Digite seu email" formControlName="email">
        </div>
        <div class="mb-3">
            <label for="cargo" class="form-label">Cargo</label>
            <input type="text" class="form-control w-75" placeholder="Digite seu cargo" formControlName="cargo">
        </div>
        <div class="mb-3">
            <label for="salario" class="form-label">Salário</label>
            <input type="number" step="any" class="form-control w-25" placeholder="Digite seu salário"
                formControlName="salario">
        </div>
        <div class="mb-3">
            <label for="cpf" class="form-label">Cpf</label>
            <input type="text" class="form-control w-25" placeholder="Digite seu Cpf" formControlName="cpf">
        </div>
        <div class="mb-3">
            <label for="situacao" class="form-label">Situação</label>
            <select name="situacao" class="form-select w-25" formControlName="situacao">
                <option value="true" selected>Ativo</option>
                <option value="false">Inativo</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="text" class="form-control w-75" placeholder="Digite sua senha" formControlName="senha">
        </div>
        <button type="submit" class="btn btn-success mx-2 mb-5">Salvar Cadastro</button>
        <button type="reset" class="btn btn-danger mx-2 mb-5" routerLink="/">Cancelar</button>
    </form>

</div>
